
    <!DOCTYPE html>
    <html>
      <head>
        <meta charset="utf-8" />
        <title>Barcode Labels</title>
        <style>
    
    @page label-row {
      size: 110mm 27mm;
      size: 4.331in 1.063in;
      margin: 0;
    }
    @page label-row-last {
      size: 110mm 25mm;
      size: 4.331in 0.984in;
      margin: 0;
    }
  
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      font-family: Arial, Helvetica, sans-serif;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
    .print-content {
      width: 110mm;
    }
    .sheet {
      page: label-row;
      width: 110mm;
      height: 27mm;
      max-height: 27mm;
      border-collapse: collapse;
      table-layout: fixed;
      page-break-inside: avoid;
      break-inside: avoid;
      overflow: hidden;
    }
    .sheet:not(:last-child) {
      page-break-after: always;
      break-after: page;
    }
    .sheet.last-row {
      page: label-row-last;
      height: 25mm;
      max-height: 25mm;
    }
    .sheet:last-child {
      page-break-after: avoid !important;
      break-after: avoid !important;
    }
    .label {
      width: 36.666666666666664mm;
      height: 25mm;
      max-height: 25mm;
      overflow: hidden;
      vertical-align: middle;
    }
    .label-inner {
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: stretch;
      width: 100%;
      height: 25mm;
      max-height: 25mm;
      overflow: hidden;
      box-sizing: border-box;
      padding: 0 1.2mm;
    }
    .top-spacer {
      flex-shrink: 0;
      height: 3mm;
      max-height: 3mm;
      line-height: 0;
      font-size: 0;
    }
    .label-content {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: stretch;
      flex: 0 0 22mm;
      height: 22mm;
      max-height: 22mm;
      overflow: hidden;
      box-sizing: border-box;
    }
    .label-empty {
      padding: 0;
    }
    .sheet > tr:first-child {
      height: 25mm;
    }
    .sheet-gap {
      height: 2mm;
      max-height: 2mm;
      line-height: 0;
      font-size: 0;
      padding: 0;
    }
    
          .label.neo {
            padding: 0;
            text-align: center;
          }
          
          .enterprise-line {
            font-size: 6.5pt;
            font-weight: 700;
            line-height: 1.05;
            color: #000;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
            margin-bottom: 0.12mm;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
          }
          .company {
            font-weight: 700;
            font-size: 9pt;
            line-height: 1;
            letter-spacing: 0.3px;
            margin-bottom: 0.25mm;
          }
          .barcode-wrap {
            line-height: 0;
            height: 4.5mm;
            overflow: hidden;
            margin: 0 auto 0.2mm;
            width: 90%;
            max-width: 90%;
          }
          .barcode-wrap svg {
            width: 100%;
            height: 4.5mm;
            display: block;
          }
          .code {
            font-size: 8pt;
            font-weight: 700;
            line-height: 1;
            letter-spacing: 0.4px;
            margin-bottom: 0.25mm;
          }
          
          .info-line {
            font-size: 7pt;
            line-height: 1.12;
            width: 100%;
            max-width: 100%;
            text-align: center;
            overflow: hidden;
            color: #000;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
          }
          .info-line.mrp-product {
            font-size: 7.5pt;
            font-weight: 700;
            white-space: nowrap;
            text-overflow: ellipsis;
          }
          .info-line.footer {
            font-size: 8pt;
            font-weight: 700;
            margin-top: 0.1mm;
          }
        
        
        
    @media print {
      .print-setup-notice {
        display: none !important;
      }
      html, body {
        width: 110mm !important;
        height: 25mm !important;
        max-height: 25mm !important;
        margin: 0 !important;
        padding: 0 !important;
        overflow: hidden !important;
      }
      .print-content {
        width: 110mm !important;
      }
      .sheet {
        width: 110mm !important;
        page: label-row;
      }
      .sheet.last-row {
        height: 25mm !important;
        max-height: 25mm !important;
        page: label-row-last !important;
      }
      .sheet:not(.last-row) {
        height: 27mm !important;
        max-height: 27mm !important;
      }
      .sheet:last-child {
        page-break-after: avoid !important;
      }
    }
    @media screen {
      body {
        padding: 16px;
        background: #f0f0f0;
        width: auto;
        max-width: 720px;
      }
      .print-setup-notice {
        background: #fff;
        border: 1px solid #d9d9d9;
        border-left: 4px solid #faad14;
        border-radius: 6px;
        padding: 16px 20px;
        margin-bottom: 16px;
        font-size: 14px;
        line-height: 1.5;
      }
      .print-setup-notice h1 {
        margin: 0 0 8px;
        font-size: 18px;
      }
      .print-setup-notice .letter-warning {
        margin: 0 0 12px;
        color: #ad6800;
        font-weight: 600;
      }
      .print-setup-notice ol {
        margin: 0 0 16px;
        padding-left: 20px;
      }
      .print-now-btn {
        background: #1677ff;
        color: #fff;
        border: none;
        border-radius: 6px;
        padding: 8px 20px;
        font-size: 15px;
        cursor: pointer;
      }
      .print-now-btn:hover {
        background: #4096ff;
      }
      .print-content .sheet {
        margin-bottom: 8px;
        background: #fff;
        box-shadow: 0 1px 4px rgba(0,0,0,0.15);
      }
    }
  </style>
